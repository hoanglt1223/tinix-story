services:
  tinix-story:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tinix-story
    restart: unless-stopped
    ports:
      - "${NOVEL_TOOL_PORT:-7860}:7860"
    environment:
      - APP_LANGUAGE=${APP_LANGUAGE:-VI}
      - NOVEL_TOOL_HOST=0.0.0.0
      - NOVEL_TOOL_PORT=7860
      - NOVEL_TOOL_SHARE=${NOVEL_TOOL_SHARE:-false}
      # Turso cloud DB (để trống = dùng SQLite local trong volume)
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL:-}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
    volumes:
      # Persistent data (SQLite local mode)
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

